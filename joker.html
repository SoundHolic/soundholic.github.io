<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#0a0a1a">
<title>joker</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow-x:hidden; background:#0a0a1a; }
body { display:flex; align-items:center; justify-content:center; min-height:200vh; }

.scene {
  position:fixed; top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:min(80vw,500px); height:min(80vw,500px);
}

@keyframes pulse {
  0%,100% { opacity:0.4; transform:scale(1); }
  50% { opacity:0.8; transform:scale(1.08); }
}
@keyframes float {
  0%,100% { transform:translateY(0) translateX(0); opacity:0.2; }
  50% { transform:translateY(-40px) translateX(15px); opacity:0.7; }
}

.ring {
  position:absolute; border-radius:50%; pointer-events:none;
  top:-30px; left:-30px; right:-30px; bottom:-30px;
  border:3px solid rgba(168,85,247,0.3);
  animation:pulse 3s ease-in-out infinite;
}
.ring2 {
  position:absolute; border-radius:50%; pointer-events:none;
  top:-55px; left:-55px; right:-55px; bottom:-55px;
  border:2px solid rgba(34,211,238,0.15);
  animation:pulse 3s ease-in-out 0.5s infinite;
}

.particle {
  position:fixed; border-radius:50%; pointer-events:none;
}
.p1 { top:15%; left:15%; width:10px; height:10px; background:#a855f7; animation:float 4s ease-in-out infinite; }
.p2 { top:25%; right:18%; width:6px; height:6px; background:#22d3ee; animation:float 5s ease-in-out 1s infinite; }
.p3 { bottom:20%; left:30%; width:12px; height:12px; background:#22c55e; animation:float 3.5s ease-in-out 2s infinite; }
.p4 { top:40%; right:12%; width:5px; height:5px; background:#ef4444; animation:float 4.5s ease-in-out 0.5s infinite; }
.p5 { bottom:30%; left:8%; width:8px; height:8px; background:#a855f7; animation:float 3s ease-in-out 1.5s infinite; }
.p6 { top:55%; right:30%; width:7px; height:7px; background:#22d3ee; animation:float 6s ease-in-out 3s infinite; }
</style>
</head>
<body>
<div class="particle p1"></div>
<div class="particle p2"></div>
<div class="particle p3"></div>
<div class="particle p4"></div>
<div class="particle p5"></div>
<div class="particle p6"></div>

<div class="scene" id="joker">
  <div class="ring"></div>
  <div class="ring2"></div>
  <svg viewBox="0 0 500 500" style="width:100%;height:100%;filter:drop-shadow(0 0 40px rgba(168,85,247,0.5)) drop-shadow(0 0 80px rgba(34,211,238,0.25))" id="joker-svg">
    <defs>
      <radialGradient id="bg"><stop offset="0%" stop-color="#1a1025"/><stop offset="100%" stop-color="#0a0a1a"/></radialGradient>
    </defs>
    <rect width="500" height="500" fill="url(#bg)" rx="250"/>
    
    <ellipse cx="250" cy="75" rx="185" ry="130" fill="#22c55e"/>
    <path d="M110 150 Q70 50 160 15 Q230 -25 250 5 Q270 -25 340 15 Q430 50 390 150" fill="#16a34a"/>
    <path d="M90 140 Q50 20 250 -5 Q450 20 410 140" fill="#22c55e"/>
    <path d="M100 130 Q60 0 250 -15 Q440 0 400 130" fill="#4ade80" opacity="0.5"/>
    
    <ellipse cx="250" cy="255" rx="155" ry="175" fill="#f1f5f9"/>
    <ellipse cx="250" cy="260" rx="138" ry="160" fill="#ffffff"/>
    
    <ellipse cx="250" cy="265" rx="24" ry="28" fill="#ef4444"/>
    <ellipse cx="243" cy="257" rx="8" ry="6" fill="#fca5a5" opacity="0.5"/>
    
    <path d="M155 215 L200 235 L115 248 Z" fill="#1e1b4b" opacity="0.65"/>
    <path d="M345 215 L300 235 L385 248 Z" fill="#1e1b4b" opacity="0.65"/>
    
    <ellipse cx="195" cy="240" rx="30" ry="22" fill="#ffffff"/>
    <ellipse cx="305" cy="240" rx="30" ry="22" fill="#ffffff"/>
    <circle cx="200" cy="240" r="13" fill="#0f172a"/>
    <circle cx="300" cy="240" r="13" fill="#0f172a"/>
    <circle cx="205" cy="236" r="5" fill="#ffffff"/>
    <circle cx="295" cy="236" r="5" fill="#ffffff"/>
    
    <path d="M155 205 Q195 188 235 210" stroke="#0f172a" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M345 205 Q305 188 265 210" stroke="#0f172a" stroke-width="6" fill="none" stroke-linecap="round"/>
    
    <path d="M150 310 Q250 420 350 310" stroke="#0f172a" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M150 310 Q160 375 180 385" stroke="#dc2626" stroke-width="7" fill="none" stroke-linecap="round"/>
    <path d="M350 310 Q340 375 320 385" stroke="#dc2626" stroke-width="7" fill="none" stroke-linecap="round"/>
    
    <path d="M210 320 Q250 345 290 320" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <rect x="215" y="298" width="10" height="10" rx="2" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <rect x="230" y="295" width="10" height="10" rx="2" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <rect x="260" y="295" width="10" height="10" rx="2" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <rect x="275" y="298" width="10" height="10" rx="2" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    
    <path d="M150 310 Q250 390 350 310" fill="#dc2626" opacity="0.25"/>
    <path d="M180 330 Q250 385 320 330" fill="#dc2626" opacity="0.15"/>
    
    <path d="M135 430 L250 355 L365 430" fill="#7c3aed"/>
    <path d="M135 430 L250 390 L140 490 Z" fill="#6d28d9"/>
    <path d="M365 430 L250 390 L360 490 Z" fill="#6d28d9"/>
  </svg>
</div>

<script>
(function(){
  var svg = document.getElementById('joker-svg');
  if(!svg) return;
  window.addEventListener('scroll',function(){
    var y = window.scrollY;
    var maxY = Math.max(document.body.scrollHeight - window.innerHeight, 1);
    var pct = Math.min(y / maxY, 1);
    var r = pct * 20 - 10;
    var s = 1 + pct * 0.2;
    svg.style.transform = 'rotate(' + r + 'deg) scale(' + s + ')';
    svg.style.filter = 'drop-shadow(0 0 ' + (40 + pct*60) + 'px rgba(168,85,247,' + (0.5 + pct*0.3) + ')) drop-shadow(0 0 ' + (80 + pct*80) + 'px rgba(34,211,238,' + (0.25 + pct*0.2) + '))';
  });
})();
</script>
</body>
</html>
