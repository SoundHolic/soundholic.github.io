<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5.0">
<meta name="theme-color" content="#0a0a1a">
<title>投资 | ishuai</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700;900&family=M+PLUS+Rounded+1c:wght@400;700;800&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/lightweight-charts@4.2.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
  .invest-container { max-width:1200px; margin:120px auto 40px; padding:0 20px; }
  .holdings-wrapper { position:relative; margin-bottom:32px; display:flex; align-items:center; }
  .holdings-scroll { display:flex; gap:20px; overflow-x:auto; scroll-behavior:smooth; scrollbar-width:none; -ms-overflow-style:none; flex:1; padding:4px 0; }
  .holdings-scroll::-webkit-scrollbar { display:none; }
  .scroll-arrow {
    flex-shrink:0; width:40px; height:40px; border-radius:50%;
    background:rgba(0,255,255,0.1); border:1px solid rgba(0,255,255,0.3);
    color:#0ff; font-size:18px; cursor:pointer; display:none; align-items:center; justify-content:center;
    transition:background .2s; z-index:2;
  }
  .scroll-arrow:hover { background:rgba(0,255,255,0.2); }
  .scroll-arrow.visible { display:flex; }
  .holding-card {
    flex-shrink:0; width:300px;
    background:rgba(255,255,255,0.03); border:1px solid rgba(0,255,255,0.15);
    border-radius:12px; padding:20px; backdrop-filter:blur(10px); cursor:pointer;
    transition:border-color .3s, transform .2s;
  }
  .holding-card:hover { border-color:rgba(0,255,255,0.5); transform:translateY(-2px); }
  .holding-card.active { border-color:rgba(0,255,255,0.6); box-shadow:0 0 20px rgba(0,255,255,0.1); }
  .holding-card .symbol { font-family:Orbitron; font-size:20px; font-weight:700; color:#0ff; }
  .holding-card .name { font-size:13px; color:#888; margin:4px 0 12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .holding-card .row { display:flex; justify-content:space-between; padding:6px 0; font-size:14px; border-bottom:1px solid rgba(255,255,255,0.05); }
  .holding-card .row .label { color:#666; }
  .holding-card .row .value { color:#ccc; font-family:Orbitron; }
  .holding-card .row .value.red { color:#f44; }
  .holding-card .row .value.green { color:#0f0; }
  .chart-section { margin-bottom:40px; }
  .chart-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .chart-header h3 { font-size:18px; color:#0ff; font-family:Orbitron; margin:0; }
  .chart-wrap { position:relative; width:100%; height:500px; background:rgba(0,0,0,0.3); border-radius:8px; overflow:hidden; }
  .chart-wrap .loading { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:#555; font-size:14px; }
  .trade-log { margin-top:32px; }
  .trade-log h3 { font-size:18px; color:#0ff; margin-bottom:12px; font-family:Orbitron; }
  .trade-table { width:100%; border-collapse:collapse; font-size:14px; }
  .trade-table th { text-align:left; padding:10px 12px; border-bottom:1px solid rgba(0,255,255,0.2); color:#0ff; font-weight:500; }
  .trade-table td { padding:10px 12px; border-bottom:1px solid rgba(255,255,255,0.05); color:#ccc; }
  .trade-table .buy { color:#0f0; }
  .trade-table .sell { color:#f44; }

  /* === Mobile === */
  @media(max-width:768px){
    .invest-container { margin:80px auto 30px; padding:0 16px; }
    .chart-wrap { height:350px; }
    .chart-header h3 { font-size:15px; }
    .holding-card { width:260px; padding:16px; }
    .holding-card .symbol { font-size:17px; }
    .holding-card .row { font-size:13px; padding:5px 0; }
    .trade-table { font-size:13px; }
    .trade-table th, .trade-table td { padding:8px 8px; }
  }
  @media(max-width:480px){
    .invest-container { margin:70px auto 24px; padding:0 12px; }
    .chart-wrap { height:280px; }
    .chart-header h3 { font-size:13px; }
    .holding-card { width:220px; padding:14px; }
    .holding-card .symbol { font-size:15px; }
    .holding-card .name { font-size:11px; }
    .holding-card .row { font-size:12px; }
    .scroll-arrow { width:32px; height:32px; font-size:14px; }
    .trade-section { overflow-x:auto; }
    .trade-table { font-size:12px; min-width:480px; }
    .trade-table th, .trade-table td { padding:6px 6px; }
  }
</style>
</head>
<body>
<div id="particles"></div>
<canvas id="matrix"></canvas>

<header id="header">
  <nav class="nav-container">
    <a href="/index/" class="logo">
      <span class="logo-bracket">[</span>
      <span class="logo-text">ishuai</span>
      <span class="logo-bracket">]</span>
    </a>
    <button class="nav-toggle" aria-label="menu" onclick="toggleNav()">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links" id="navLinks">
      <li><a href="/index/" data-i18n="nav.home">Home</a></li>
      <li><a href="records.html" data-i18n="nav.records">记录</a></li>
      <li><a href="invest.html" data-i18n="nav.invest" class="active">投资</a></li>
      <li class="lang-switch">
        <button class="lang-btn" onclick="toggleLang(event)" aria-label="language">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>
          <span id="langLabel">中</span>
        </button>
        <div class="lang-dropdown" id="langDropdown">
          <button onclick="setLang('zh')">中文</button>
          <button onclick="setLang('en')">English</button>
          <button onclick="setLang('ja')">日本語</button>
        </div>
      </li>
    </ul>
  </nav>
</header>

<main>
<div class="invest-container">

  <div class="holdings-wrapper">
    <button class="scroll-arrow" id="scrollLeft" onclick="scrollHoldings(-1)">‹</button>
    <div class="holdings-scroll" id="holdingsGrid"></div>
    <button class="scroll-arrow" id="scrollRight" onclick="scrollHoldings(1)">›</button>
  </div>

  <div class="chart-section">
    <div class="chart-header">
      <h3 id="chartTitle" data-i18n="invest.clickHint">点击上方持仓卡片查看走势图</h3>
    </div>
    <div class="chart-wrap" id="chartArea"><div class="loading" data-i18n="invest.clickHint">点击上方持仓卡片查看走势图</div></div>
  </div>

  <div class="trade-log">
    <h3 data-i18n="invest.tradeLog">操作记录</h3>
    <div class="trade-section">
    <table class="trade-table" id="tradeTable">
      <thead><tr>
        <th data-i18n="invest.thDate">日期</th>
        <th data-i18n="invest.thCode">代码</th>
        <th data-i18n="invest.thDir">方向</th>
        <th data-i18n="invest.thPrice">价格</th>
        <th data-i18n="invest.thQty">数量</th>
        <th data-i18n="invest.thNote">备注</th>
      </tr></thead>
      <tbody id="tradeBody">
        <tr><td colspan="6" class="empty-state" data-i18n="invest.noTrades">暂无操作记录</td></tr>
      </tbody>
    </table>
    </div>
  </div>

</div>
</main>

<footer>
  <p>© 2026 shuai · <span data-i18n="footer.powered">Powered by</span> <span class="footer-accent">Code & Coffee ☕</span></p>
  <p class="footer-jp" data-i18n="footer.jp">このページは愛と情熱で作られました</p>
</footer>

<script src="i18n.js"></script>
<script src="main.js"></script>
<script>
const HOLDINGS = {
  '300724': { cost:78.67, shares:2300, name:'捷佳伟创', type:'stock' },
  '012414': { cost:0.56, shares:13196, name:'招商中证白酒指数(LOF)C', type:'fund' },
  '007339': { cost:1.95, shares:51, name:'易方达沪深300ETF联接C', type:'fund' }
};
const TRADES = [];
let klineData = null, fundNavData = {};
let activeCode = null, activeChart = null, activeSeries = null;

function t(key) { return (I18N[currentLang] && I18N[currentLang][key]) || key; }

// === 渲染持仓卡片 ===
function renderHoldingCards() {
  const grid = document.getElementById('holdingsGrid');
  const codes = Object.keys(HOLDINGS);
  grid.innerHTML = codes.map(code => {
    const h = HOLDINGS[code];
    let price = 0;
    if (h.type === 'stock' && klineData && klineData.length) {
      price = klineData[klineData.length-1].c;
    } else if (h.type === 'fund' && fundNavData[code] && fundNavData[code].length) {
      price = fundNavData[code][fundNavData[code].length-1].v;
    }
    const val = price * h.shares;
    const costVal = h.cost * h.shares;
    const pl = val - costVal;
    const plPct = price ? ((price - h.cost) / h.cost * 100).toFixed(2) : '--';
    const cl = pl >= 0 ? 'green' : 'red';
    const activeClass = (activeCode === code) ? ' active' : '';
    const isStock = h.type === 'stock';
    const costLabel = isStock ? 'invest.costPrice' : 'invest.costNav';
    const unitKey = isStock ? 'invest.shares' : 'invest.units';

    return `<div class="holding-card${activeClass}" onclick="switchTo('${code}')">
      <div class="symbol">${code}</div>
      <div class="name">${h.name}</div>
      <div class="row"><span class="label" data-i18n="${costLabel}">${t(costLabel)}</span><span class="value">¥${h.cost}</span></div>
      <div class="row"><span class="label" data-i18n="invest.holdings">${t('invest.holdings')}</span><span class="value">${h.shares.toLocaleString()} <span data-i18n="${unitKey}">${t(unitKey)}</span></span></div>
      <div class="row"><span class="label" data-i18n="invest.marketValue">${t('invest.marketValue')}</span><span class="value">¥${val.toLocaleString('zh-CN',{minimumFractionDigits:2})}</span></div>
      <div class="row"><span class="label" data-i18n="invest.profit">${t('invest.profit')}</span><span class="value ${cl}">${pl>=0?'+':''}${pl.toLocaleString('zh-CN',{minimumFractionDigits:2})} (${plPct>=0?'+':''}${plPct}%)</span></div>
    </div>`;
  }).join('');

  // Re-apply i18n to new elements
  setTimeout(() => { if(typeof applyLang==='function') applyLang(currentLang); }, 0);
  updateScrollArrows();
}

function scrollHoldings(dir) {
  const el = document.getElementById('holdingsGrid');
  el.scrollBy({ left: el.clientWidth * 0.75 * dir, behavior:'smooth' });
}

function updateScrollArrows() {
  const el = document.getElementById('holdingsGrid');
  const left = document.getElementById('scrollLeft');
  const right = document.getElementById('scrollRight');
  if (!el || !left || !right) return;
  const canScroll = el.scrollWidth > el.clientWidth + 2;
  left.classList.toggle('visible', canScroll);
  right.classList.toggle('visible', canScroll);
  if (canScroll) {
    left.style.opacity = el.scrollLeft <= 2 ? '0.3' : '1';
    right.style.opacity = el.scrollLeft + el.clientWidth >= el.scrollWidth - 2 ? '0.3' : '1';
  }
}

// === 切换标的 ===
function switchTo(code) {
  activeCode = code;
  renderHoldingCards();
  const h = HOLDINGS[code];

  if (!window.LightweightCharts) return;

  const container = document.getElementById('chartArea');
  container.innerHTML = '';
  if (activeChart) { activeChart.remove(); activeChart = null; activeSeries = null; }

  const chartH = window.innerWidth <= 480 ? 280 : (window.innerWidth <= 768 ? 350 : 500);
  activeChart = window.LightweightCharts.createChart(container, {
    width:container.clientWidth, height:chartH,
    layout:{ background:{type:'solid',color:'rgba(0,0,0,0.0)'}, textColor:'#888' },
    grid:{ vertLines:{color:'rgba(255,255,255,0.04)'}, horzLines:{color:'rgba(255,255,255,0.04)'} },
    crosshair:{mode:1},
    rightPriceScale:{borderColor:'rgba(255,255,255,0.1)'},
    timeScale:{borderColor:'rgba(255,255,255,0.1)',timeVisible:true},
  });

  const suffix = h.type==='stock' ? ' · '+t('invest.dailyK') : ' · '+t('invest.navChart');
  document.getElementById('chartTitle').textContent = code + ' ' + h.name + suffix;

  if (h.type === 'stock') {
    const data = klineData.map(d => ({time:d.t,open:d.o,high:d.h,low:d.l,close:d.c}));
    activeSeries = activeChart.addCandlestickSeries({
      upColor:'#00ff88',downColor:'#ff4466',borderUpColor:'#00ff88',borderDownColor:'#ff4466',
      wickUpColor:'#00ff88',wickDownColor:'#ff4466',
    });
    activeSeries.setData(data);
    const markers = TRADES.filter(t=>t.symbol===code).map(t=>({
      time:t.date, position:t.type==='buy'?'belowBar':'aboveBar',
      color:t.type==='buy'?'#00ff88':'#ff4466', shape:t.type==='buy'?'arrowUp':'arrowDown',
      text:(t.type==='buy'?t('invest.buy').charAt(0):t('invest.sell').charAt(0))+t.price, size:2,
    }));
    if(markers.length) activeSeries.setMarkers(markers);
  } else {
    const data = fundNavData[code].map(d => ({time:d.t,value:d.v}));
    activeSeries = activeChart.addLineSeries({
      color:'#00ff88', lineWidth:2, priceLineVisible:false, lastValueVisible:true,
    });
    activeSeries.setData(data);
  }

  const lineTitle = (h.type==='stock' ? t('invest.costLine') : t('invest.navLine')) + ' ' + h.cost;
  activeSeries.createPriceLine({
    price:h.cost, color:'#ffff00', lineWidth:2, lineStyle:2, axisLabelVisible:true, title: lineTitle,
  });

  activeChart.timeScale().fitContent();
}

// === 操作记录 ===
function renderTrades() {
  const tbody = document.getElementById('tradeBody');
  if(!TRADES.length){
    tbody.innerHTML = `<tr><td colspan="6" class="empty-state" data-i18n="invest.noTrades">${t('invest.noTrades')}</td></tr>`;
    return;
  }
  tbody.innerHTML = TRADES.map(tr=>`
    <tr><td>${tr.date}</td><td>${tr.symbol}</td>
    <td class="${tr.type}">${tr.type==='buy'?t('invest.buy'):t('invest.sell')}</td>
    <td>¥${tr.price}</td><td>${tr.shares}</td><td>${tr.note||''}</td></tr>
  `).join('');
}

// === Resize ===
window.addEventListener('resize',()=>{
  if(activeChart){
    const c = document.getElementById('chartArea');
    const h = window.innerWidth <= 480 ? 280 : (window.innerWidth <= 768 ? 350 : 500);
    activeChart.applyOptions({width:c.clientWidth, height:h});
  }
  updateScrollArrows();
});

// === Scroll arrows ===
document.addEventListener('DOMContentLoaded',()=>{
  const el = document.getElementById('holdingsGrid');
  if(el) el.addEventListener('scroll', updateScrollArrows);
});

// === Init ===
async function init() {
  try {
    const [kresp, f1resp, f2resp] = await Promise.all([
      fetch('data/300724_kline.json'),
      fetch('data/012414_nav.json'),
      fetch('data/007339_nav.json')
    ]);
    klineData = await kresp.json();
    fundNavData = { '012414':await f1resp.json(), '007339':await f2resp.json() };
    renderHoldingCards();
    renderTrades();
    switchTo('300724');
  } catch(e) {
    document.getElementById('chartArea').innerHTML = `<div class="loading">${t('invest.loadError')}: ${e.message}</div>`;
  }
}

// Re-render invest page when language changes
(function patchLang() {
  if (typeof applyLang === 'function') {
    const orig = applyLang;
    applyLang = function(lang) {
      orig(lang);
      if (document.querySelector('.holding-card')) {
        renderHoldingCards();
        renderTrades();
        if (activeCode) switchTo(activeCode);
      }
    };
  } else {
    setTimeout(patchLang, 50);
  }
})();

init();
</script>
</body>
</html>
