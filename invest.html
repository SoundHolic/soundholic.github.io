<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5.0">
<meta name="theme-color" content="#0a0a1a">
<title>投资 | ishuai</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700;900&family=M+PLUS+Rounded+1c:wght@400;700;800&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/lightweight-charts@4.2.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
  .invest-container { max-width:1200px; margin:120px auto 40px; padding:0 20px; }
  .holdings-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:20px; margin-bottom:32px; }
  .holding-card {
    background:rgba(255,255,255,0.03); border:1px solid rgba(0,255,255,0.15);
    border-radius:12px; padding:20px; backdrop-filter:blur(10px); cursor:default;
    transition:border-color .3s, transform .2s;
  }
  .holding-card.clickable { cursor:pointer; }
  .holding-card.clickable:hover { border-color:rgba(0,255,255,0.5); transform:translateY(-2px); }
  .holding-card.active { border-color:rgba(0,255,255,0.6); box-shadow:0 0 20px rgba(0,255,255,0.1); }
  .holding-card .symbol { font-family:Orbitron; font-size:20px; font-weight:700; color:#0ff; }
  .holding-card .name { font-size:13px; color:#888; margin:4px 0 12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .holding-card .row { display:flex; justify-content:space-between; padding:6px 0; font-size:14px; border-bottom:1px solid rgba(255,255,255,0.05); }
  .holding-card .row .label { color:#666; }
  .holding-card .row .value { color:#ccc; font-family:Orbitron; }
  .holding-card .row .value.red { color:#f44; }
  .holding-card .row .value.green { color:#0f0; }
  .chart-section { margin-bottom:40px; }
  .chart-section h3 { font-size:18px; color:#0ff; margin-bottom:12px; font-family:Orbitron; }
  .chart-wrap { position:relative; width:100%; height:500px; background:rgba(0,0,0,0.3); border-radius:8px; overflow:hidden; }
  .chart-wrap .loading { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:#555; font-size:14px; }
  .fund-chart-section { margin-bottom:40px; }
  .fund-chart-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .fund-chart-header h3 { font-size:18px; color:#0ff; font-family:Orbitron; margin:0; }
  .fund-chart-wrap { width:100%; height:400px; background:rgba(0,0,0,0.3); border-radius:8px; overflow:hidden; position:relative; }
  .empty-state { text-align:center; padding:60px 20px; color:#555; font-size:15px; }
  .trade-log { margin-top:32px; }
  .trade-log h3 { font-size:18px; color:#0ff; margin-bottom:12px; font-family:Orbitron; }
  .trade-table { width:100%; border-collapse:collapse; font-size:14px; }
  .trade-table th { text-align:left; padding:10px 12px; border-bottom:1px solid rgba(0,255,255,0.2); color:#0ff; font-weight:500; }
  .trade-table td { padding:10px 12px; border-bottom:1px solid rgba(255,255,255,0.05); color:#ccc; }
  .trade-table .buy { color:#0f0; }
  .trade-table .sell { color:#f44; }
</style>
</head>
<body>
<div id="particles"></div>
<canvas id="matrix"></canvas>

<header id="header">
  <nav class="nav-container">
    <a href="index.html" class="logo">
      <span class="logo-bracket">[</span>
      <span class="logo-text">ishuai</span>
      <span class="logo-bracket">]</span>
    </a>
    <button class="nav-toggle" aria-label="menu" onclick="toggleNav()">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html" data-i18n="nav.home">Home</a></li>
      <li><a href="records.html" data-i18n="nav.records">记录</a></li>
      <li><a href="invest.html" data-i18n="nav.invest" class="active">投资</a></li>
      <li class="lang-switch">
        <button class="lang-btn" onclick="toggleLang(event)" aria-label="language">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>
          <span id="langLabel">中</span>
        </button>
        <div class="lang-dropdown" id="langDropdown">
          <button onclick="setLang('zh')">中文</button>
          <button onclick="setLang('en')">English</button>
          <button onclick="setLang('ja')">日本語</button>
        </div>
      </li>
    </ul>
  </nav>
</header>

<main>
<div class="invest-container">

  <div class="holdings-grid" id="holdingsGrid"></div>

  <div class="chart-section">
    <h3>300724 捷佳伟创 · 日K</h3>
    <div class="chart-wrap" id="chart300724"><div class="loading">加载中...</div></div>
  </div>

  <div class="fund-chart-section">
    <div class="fund-chart-header">
      <h3 id="fundChartTitle">基金净值走势</h3>
    </div>
    <div class="fund-chart-wrap" id="chartFund"><div class="loading">点击上方基金卡片查看净值走势</div></div>
  </div>

  <div class="trade-log" id="tradeLogSection">
    <h3>操作记录</h3>
    <table class="trade-table" id="tradeTable">
      <thead><tr><th>日期</th><th>代码</th><th>方向</th><th>价格</th><th>数量</th><th>备注</th></tr></thead>
      <tbody id="tradeBody">
        <tr><td colspan="6" class="empty-state">暂无操作记录</td></tr>
      </tbody>
    </table>
  </div>

</div>
</main>

<footer>
  <p>© 2026 shuai · <span data-i18n="footer.powered">Powered by</span> <span class="footer-accent">Code & Coffee ☕</span></p>
  <p class="footer-jp" data-i18n="footer.jp">このページは愛と情熱で作られました</p>
</footer>

<script src="i18n.js"></script>
<script src="main.js"></script>
<script>
// === 持仓数据 ===
const HOLDINGS = {
  '300724': { cost:78.67, shares:2300, name:'捷佳伟创', type:'stock' },
  '012414': { cost:0.56, shares:13196, name:'招商中证白酒指数(LOF)C', type:'fund' },
  '007339': { cost:1.95, shares:51, name:'易方达沪深300ETF联接C', type:'fund' }
};

const TRADES = [];

let activeFundCode = null;
let fundChart = null;
let fundLineSeries = null;

// === 渲染持仓卡片 ===
function renderHoldingCards(klines, funds) {
  const grid = document.getElementById('holdingsGrid');

  // 计算300724最新价
  const lastK = klines[klines.length-1];
  const price300724 = lastK.c;

  // 计算基金最新净值
  const nav012414 = funds['012414'].length ? funds['012414'][funds['012414'].length-1].v : 0;
  const nav007339 = funds['007339'].length ? funds['007339'][funds['007339'].length-1].v : 0;

  const cards = [
    { code:'300724', price:price300724 },
    { code:'012414', price:nav012414 },
    { code:'007339', price:nav007339 },
  ];

  grid.innerHTML = cards.map(c => {
    const h = HOLDINGS[c.code];
    const val = c.price * h.shares;
    const costVal = h.cost * h.shares;
    const pl = val - costVal;
    const plPct = c.price ? ((c.price - h.cost) / h.cost * 100).toFixed(2) : '--';
    const cl = pl >= 0 ? 'green' : 'red';
    const isFund = h.type === 'fund';
    const clickable = isFund ? ' clickable' : '';
    const activeClass = (activeFundCode === c.code) ? ' active' : '';
    const onclick = isFund ? ` onclick="switchFund('${c.code}')"` : '';

    return `<div class="holding-card${clickable}${activeClass}"${onclick}>
      <div class="symbol">${c.code}</div>
      <div class="name">${h.name}</div>
      <div class="row"><span class="label">成本${isFund?'净值':'价'}</span><span class="value">¥${h.cost}</span></div>
      <div class="row"><span class="label">持仓</span><span class="value">${h.shares.toLocaleString()} ${isFund?'份':'股'}</span></div>
      <div class="row"><span class="label">市值</span><span class="value">¥${val.toLocaleString('zh-CN',{minimumFractionDigits:2})}</span></div>
      <div class="row"><span class="label">盈亏</span><span class="value ${cl}">${pl>=0?'+':''}${pl.toLocaleString('zh-CN',{minimumFractionDigits:2})} (${plPct>=0?'+':''}${plPct}%)</span></div>
    </div>`;
  }).join('');
}

// === K线图 ===
function renderKlineChart(klines) {
  const container = document.getElementById('chart300724');
  container.innerHTML = '';
  if (!window.LightweightCharts) { container.innerHTML='<div class="loading">图表库加载失败</div>'; return; }

  const chart = window.LightweightCharts.createChart(container, {
    width:container.clientWidth, height:500,
    layout:{ background:{type:'solid',color:'rgba(0,0,0,0.0)'}, textColor:'#888' },
    grid:{ vertLines:{color:'rgba(255,255,255,0.04)'}, horzLines:{color:'rgba(255,255,255,0.04)'} },
    crosshair:{mode:1},
    rightPriceScale:{borderColor:'rgba(255,255,255,0.1)'},
    timeScale:{borderColor:'rgba(255,255,255,0.1)',timeVisible:true},
  });

  const candleData = klines.map(d => ({time:d.t,open:d.o,high:d.h,low:d.l,close:d.c}));
  const series = chart.addCandlestickSeries({
    upColor:'#00ff88',downColor:'#ff4466',borderUpColor:'#00ff88',borderDownColor:'#ff4466',
    wickUpColor:'#00ff88',wickDownColor:'#ff4466',
  });
  series.setData(candleData);

  // 成本线
  series.createPriceLine({
    price:78.67, color:'#ffff00', lineWidth:2, lineStyle:2, axisLabelVisible:true, title:'成本 78.67',
  });

  // 操作标记
  const markers = TRADES.filter(t=>t.symbol==='300724').map(t=>({
    time:t.date, position:t.type==='buy'?'belowBar':'aboveBar',
    color:t.type==='buy'?'#00ff88':'#ff4466', shape:t.type==='buy'?'arrowUp':'arrowDown',
    text:(t.type==='buy'?'B':'S')+t.price, size:2,
  }));
  if(markers.length) series.setMarkers(markers);

  chart.timeScale().fitContent();
  window.addEventListener('resize',()=>{ chart.applyOptions({width:container.clientWidth,height:500}); });
}

// === 基金净值图 ===
let fundNavData = {};

function switchFund(code) {
  // 高亮卡片
  document.querySelectorAll('.holding-card').forEach(el => el.classList.remove('active'));
  const cards = document.querySelectorAll('.holding-card');
  if (code === '012414' && cards[1]) cards[1].classList.add('active');
  if (code === '007339' && cards[2]) cards[2].classList.add('active');

  activeFundCode = code;
  const h = HOLDINGS[code];
  const data = fundNavData[code] || [];
  if (!data.length) return;

  const container = document.getElementById('chartFund');
  container.innerHTML = '';
  document.getElementById('fundChartTitle').textContent = code + ' ' + h.name + ' · 净值走势';

  if (fundChart) { fundChart.remove(); fundChart = null; }

  fundChart = window.LightweightCharts.createChart(container, {
    width:container.clientWidth, height:400,
    layout:{ background:{type:'solid',color:'rgba(0,0,0,0.0)'}, textColor:'#888' },
    grid:{ vertLines:{color:'rgba(255,255,255,0.04)'}, horzLines:{color:'rgba(255,255,255,0.04)'} },
    crosshair:{mode:1},
    rightPriceScale:{borderColor:'rgba(255,255,255,0.1)'},
    timeScale:{borderColor:'rgba(255,255,255,0.1)',timeVisible:true},
  });

  fundLineSeries = fundChart.addLineSeries({
    color:'#00ff88', lineWidth:2,
    priceLineVisible:false, lastValueVisible:true,
  });
  fundLineSeries.setData(data.map(d => ({time:d.t,value:d.v})));

  // 成本线
  fundLineSeries.createPriceLine({
    price:h.cost, color:'#ffff00', lineWidth:2, lineStyle:2, axisLabelVisible:true, title:'成本 '+h.cost,
  });

  fundChart.timeScale().fitContent();
}

// === 操作记录 ===
function renderTrades() {
  const tbody = document.getElementById('tradeBody');
  if(!TRADES.length){ tbody.innerHTML='<tr><td colspan="6" class="empty-state">暂无操作记录</td></tr>'; return; }
  tbody.innerHTML = TRADES.map(t=>`
    <tr><td>${t.date}</td><td>${t.symbol}</td><td class="${t.type}">${t.type==='buy'?'买入':'卖出'}</td>
    <td>¥${t.price}</td><td>${t.shares}</td><td>${t.note||''}</td></tr>
  `).join('');
}

// === 启动 ===
async function init() {
  try {
    const [kresp, f1resp, f2resp] = await Promise.all([
      fetch('data/300724_kline.json'),
      fetch('data/012414_nav.json'),
      fetch('data/007339_nav.json')
    ]);
    const klines = await kresp.json();
    const nav1 = await f1resp.json();
    const nav2 = await f2resp.json();
    fundNavData = { '012414':nav1, '007339':nav2 };

    renderHoldingCards(klines, fundNavData);
    renderKlineChart(klines);
    renderTrades();

    // 默认显示012414净值图
    setTimeout(() => switchFund('012414'), 300);
  } catch(e) {
    document.getElementById('chart300724').innerHTML = '<div class="loading">数据加载失败: '+e.message+'</div>';
    document.getElementById('chartFund').innerHTML = '<div class="loading">数据加载失败</div>';
  }
}

init();
</script>
</body>
</html>
