    transition:border-color .3s;

  .holding-card .symbol { font-family:Orbitron; font-size:20px; font-weight:700; color:#0ff; }
  .holding-card .name { font-size:14px; color:#888; margin:4px 0 12px; }
  .holding-card .row { display:flex; justify-content:space-between; padding:6px 0; font-size:14px; border-bottom:1px solid rgba(255,255,255,0.05); }
  .holding-card .row .label { color:#666; }
  .holding-card .row .value { color:#ccc; font-family:Orbitron; }
  .holding-card .row .value.red { color:#f44; }
  .holding-card .row .value.green { color:#0f0; }
  .chart-section { margin-bottom:40px; }
  .chart-section h3 { font-size:18px; color:#0ff; margin-bottom:12px; font-family:Orbitron; }
  .chart-wrap { position:relative; width:100%; height:500px; background:rgba(0,0,0,0.3); border-radius:8px; overflow:hidden; }
  .chart-wrap .loading { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:#555; font-size:14px; }
  .fund-chart-wrap { width:100%; height:300px; background:rgba(0,0,0,0.3); border-radius:8px; overflow:hidden; position:relative; }
  .fund-chart-wrap .loading { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:#555; font-size:14px; }
  .empty-state { text-align:center; padding:60px 20px; color:#555; font-size:15px; }
  .trade-log { margin-top:32px; }
  .trade-log h3 { font-size:18px; color:#0ff; margin-bottom:12px; font-family:Orbitron; }
  .trade-table { width:100%; border-collapse:collapse; font-size:14px; }
  .trade-table th { text-align:left; padding:10px 12px; border-bottom:1px solid rgba(0,255,255,0.2); color:#0ff; font-weight:500; }
  .trade-table td { padding:10px 12px; border-bottom:1px solid rgba(255,255,255,0.05); color:#ccc; }
  .trade-table .buy { color:#0f0; }
  .trade-table .sell { color:#f44; }
  .fund-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:40px; }
  @media(max-width:768px){ .fund-grid{grid-template-columns:1fr;} }
</style>

<script>
// === 持仓数据 ===
const HOLDINGS = {
  '300724': { cost:78.67, shares:2300 },
  '012414': { cost:0.56, shares:13196 },
  '007339': { cost:1.95, shares:51 }
};

// 操作记录
const TRADES = [];

// === JSONP 辅助 ===
function jsonp(url, callbackName, timeout) {
  return new Promise((resolve, reject) => {
    const script = document.createElement('script');
    const timer = setTimeout(() => { cleanup(); reject(new Error('timeout')); }, timeout || 10000);
    function cleanup() { clearTimeout(timer); if(script.parentNode) script.parentNode.removeChild(script); delete window[callbackName]; }
    window[callbackName] = function(data) { cleanup(); resolve(data); };
    script.src = url;
    script.onerror = () => { cleanup(); reject(new Error('network')); };
    document.head.appendChild(script);
  });
}

// === 更新300724实时价格（腾讯API，JSONP） ===
function update300724Price() {
  const cb = '_cb300724_' + Date.now();
  const url = 'https://qt.gtimg.cn/q=sz300724?callback=' + cb;
  jsonp(url, cb, 5000).then(data => {
    // data is a string like: v_sz300724="51~捷佳伟创~...~66.93~..."
    if (typeof data === 'string') {
      const parts = data.split('~');
      const price = parseFloat(parts[3]); // 最新价
      const name = parts[1];
      updateHoldingCard('300724', price, name);
    }
  }).catch(() => {
    document.getElementById('val300724').textContent = '获取失败';
  });
}

function updateHoldingCard(code, price, name) {
  const h = HOLDINGS[code];
  if (!h) return;
  const val = price * h.shares;
  const costVal = h.cost * h.shares;
  const pl = val - costVal;
  const plPct = ((price - h.cost) / h.cost * 100).toFixed(2);

  document.getElementById('val'+code).textContent = '¥' + val.toLocaleString('zh-CN', {minimumFractionDigits:2});
  const plEl = document.getElementById('pl'+code);
  plEl.textContent = (pl>=0?'+':'') + pl.toLocaleString('zh-CN', {minimumFractionDigits:2}) + ' (' + (plPct>=0?'+':'') + plPct + '%)';
  plEl.className = 'value ' + (pl>=0?'green':'red');
  if (name) {
    const card = document.querySelector('.holding-card .symbol');
    // update name if needed
  }
}

// === 基金净值（天天基金，JSONP） ===
function fetchFundNAV(code) {
  const cb = '_cbFund_' + code + '_' + Date.now();
  const url = 'https://fundgz.1234567.com.cn/js/' + code + '.js?rt=' + Date.now();
  // 这个接口返回: jsonpgz({fundcode:"012414",name:"...",dwjz:"...",gsz:"...",...})
  return jsonp(url, 'jsonpgz', 5000).then(data => {
    if (data && data.gsz) return parseFloat(data.gsz); // 估算净值
    if (data && data.dwjz) return parseFloat(data.dwjz); // 最新净值
    return null;
  });
}

async function updateFunds() {
  for (const code of ['012414', '007339']) {
    try {
      const nav = await fetchFundNAV(code);
      if (nav) updateHoldingCard(code, nav);
    } catch(e) {
      document.getElementById('val'+code).textContent = '获取失败';
    }
  }
}

// === K线图（新浪API，JSONP） ===
function fetchKline300724() {
  const cb = '_cbKline_' + Date.now();
  const url = 'https://quotes.sina.cn/cn/api/jsonp_v2.php/data/CN_MarketDataService.getKLineData?symbol=sz300724&scale=240&ma=no&datalen=250&callback=' + cb;
  return jsonp(url, cb, 10000);
}

async function initChart() {
  const container = document.getElementById('chart300724');
  try {
    const raw = await fetchKline300724();
    const candleData = raw.map(d => ({
      time: d.day,
      open: parseFloat(d.open),
      high: parseFloat(d.high),
      low: parseFloat(d.low),
      close: parseFloat(d.close)
    }));

    // Remove loading
    container.innerHTML = '';

    const chart = window.LightweightCharts.createChart(container, {
      width: container.clientWidth,
      height: 500,
      layout: {
        background: { type:'solid', color:'rgba(0,0,0,0.0)' },
        textColor: '#888',
      },
      grid: {
        vertLines: { color:'rgba(255,255,255,0.04)' },
        horzLines: { color:'rgba(255,255,255,0.04)' },
      },
      crosshair: { mode:1 },
      rightPriceScale: { borderColor:'rgba(255,255,255,0.1)' },
      timeScale: { borderColor:'rgba(255,255,255,0.1)', timeVisible:true },
    });

    const series = chart.addCandlestickSeries({
      upColor:'#00ff88', downColor:'#ff4466', borderUpColor:'#00ff88', borderDownColor:'#ff4466',
      wickUpColor:'#00ff88', wickDownColor:'#ff4466',
    });
    series.setData(candleData);

    // 成本线
    series.createPriceLine({
      price: 78.67,
      color: '#ffff00',
      lineWidth: 2,
      lineStyle: 2,
      axisLabelVisible: true,
      title: '成本 78.67',
    });

    // 操作标记
    if (TRADES.length > 0) {
      const markers = TRADES.filter(t => t.symbol==='300724').map(t => ({
        time: t.date,
        position: t.type==='buy' ? 'belowBar' : 'aboveBar',
        color: t.type==='buy' ? '#00ff88' : '#ff4466',
        shape: t.type==='buy' ? 'arrowUp' : 'arrowDown',
        text: (t.type==='buy'?'B':'S') + t.price,
        size: 2,
      }));
      series.setMarkers(markers);
    }

    chart.timeScale().fitContent();

    window.addEventListener('resize', () => {
      chart.applyOptions({ width:container.clientWidth, height:500 });
    });
  } catch(e) {
    container.innerHTML = '<div class="loading">K线加载失败：' + e.message + '</div>';
  }
}

// === 操作记录表 ===
function renderTrades() {
  const tbody = document.getElementById('tradeBody');
  if (TRADES.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty-state">暂无操作记录</td></tr>';
    return;
  }
  tbody.innerHTML = TRADES.map(t => `
    <tr>
      <td>${t.date}</td>
      <td>${t.symbol}</td>
      <td class="${t.type}">${t.type==='buy'?'买入':'卖出'}</td>
      <td>¥${t.price}</td>
      <td>${t.shares}</td>
      <td>${t.note||''}</td>
    </tr>
  `).join('');
}

// === 启动 ===
update300724Price();
updateFunds();
initChart();
renderTrades();
</script>
