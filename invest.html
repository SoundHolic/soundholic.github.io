<style>
  .invest-container { max-width:1200px; margin:120px auto 40px; padding:0 20px; }
  .holdings-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); gap:20px; margin-bottom:32px; }
  .holding-card {
    background:rgba(255,255,255,0.03); border:1px solid rgba(0,255,255,0.15);
    border-radius:12px; padding:20px; backdrop-filter:blur(10px);
    transition:border-color .3s;
  }
  .holding-card:hover { border-color:rgba(0,255,255,0.4); }
  .holding-card .symbol { font-family:Orbitron; font-size:20px; font-weight:700; color:#0ff; }
  .holding-card .name { font-size:14px; color:#888; margin:4px 0 12px; }
  .holding-card .row { display:flex; justify-content:space-between; padding:6px 0; font-size:14px; border-bottom:1px solid rgba(255,255,255,0.05); }
  .holding-card .row .label { color:#666; }
  .holding-card .row .value { color:#ccc; font-family:Orbitron; }
  .holding-card .row .value.red { color:#f44; }
  .holding-card .row .value.green { color:#0f0; }
  .chart-section { margin-bottom:40px; }
  .chart-section h3 { font-size:18px; color:#0ff; margin-bottom:12px; font-family:Orbitron; }
  .chart-container { width:100%; height:500px; background:rgba(0,0,0,0.3); border-radius:8px; overflow:hidden; }
  .empty-state { text-align:center; padding:60px 20px; color:#555; font-size:15px; }
  .trade-log { margin-top:32px; }
  .trade-log h3 { font-size:18px; color:#0ff; margin-bottom:12px; font-family:Orbitron; }
  .trade-table { width:100%; border-collapse:collapse; font-size:14px; }
  .trade-table th { text-align:left; padding:10px 12px; border-bottom:1px solid rgba(0,255,255,0.2); color:#0ff; font-weight:500; }
  .trade-table td { padding:10px 12px; border-bottom:1px solid rgba(255,255,255,0.05); color:#ccc; }
  .trade-table .buy { color:#0f0; }
  .trade-table .sell { color:#f44; }
  .cost-line-label { font-size:12px; color:#ff0; }
</style>
</head>

      <li><a href="invest.html" data-i18n="nav.invest" class="active">投资</a></li>
      <li class="lang-switch">
        <button class="lang-btn" onclick="toggleLang(event)" aria-label="language">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>
          <span id="langLabel">中</span>

        <div class="lang-dropdown" id="langDropdown">
          <button onclick="setLang('zh')">中文</button>

<main>
<div class="invest-container">

  <!-- 持仓概览 -->

    <div class="holding-card">
      <div class="symbol">300724</div>
      <div class="name">捷佳伟创</div>
      <div class="row"><span class="label">成本价</span><span class="value">¥78.67</span></div>
      <div class="row"><span class="label">持仓</span><span class="value">2,300 股</span></div>

    </div>
    <div class="holding-card">
      <div class="symbol">012414</div>
      <div class="name">基金</div>
      <div class="row"><span class="label">成本净值</span><span class="value">¥0.56</span></div>
      <div class="row"><span class="label">持仓</span><span class="value">13,196 份</span></div>
      <div class="row"><span class="label">市值</span><span class="value" id="val012414">--</span></div>
      <div class="row"><span class="label">盈亏</span><span class="value" id="pl012414">--</span></div>
    </div>
    <div class="holding-card">
      <div class="symbol">007339</div>
      <div class="name">基金</div>
      <div class="row"><span class="label">成本净值</span><span class="value">¥1.95</span></div>
      <div class="row"><span class="label">持仓</span><span class="value">51 份</span></div>
      <div class="row"><span class="label">市值</span><span class="value" id="val007339">--</span></div>
      <div class="row"><span class="label">盈亏</span><span class="value" id="pl007339">--</span></div>
    </div>
  </div>

  <!-- 300724 K线图 -->
  <div class="chart-section">
    <h3>300724 捷佳伟创 · 日K</h3>

  <!-- 操作记录 -->

<script src="i18n.js"></script>
<script src="main.js"></script>
<script>
// === 持仓数据 ===
const HOLDINGS = {
  '300724': { cost:78.67, shares:2300 },
  '012414': { cost:0.56, shares:13196 },
  '007339': { cost:1.95, shares:51 }
};

// 操作记录（阿帅每次操作后更新这里）
const TRADES = [];

// === 更新持仓市值 ===
async function updateHoldings() {
  // 300724 实时价
  try {
    const resp = await fetch('https://push2.eastmoney.com/api/qt/stock/get?secid=0.300724&fields=f43,f44,f45,f46,f47,f48,f57,f58,f170');
    const d = await resp.json();
    const price = d.data.f43 / 100;
    const changePct = d.data.f170 / 100;
    const val = price * HOLDINGS['300724'].shares;
    const costVal = HOLDINGS['300724'].cost * HOLDINGS['300724'].shares;
    const pl = val - costVal;
    const plPct = ((price - HOLDINGS['300724'].cost) / HOLDINGS['300724'].cost * 100).toFixed(2);

    document.getElementById('val300724').textContent = '¥' + val.toLocaleString('zh-CN', {minimumFractionDigits:2});
    const plEl = document.getElementById('pl300724');
    plEl.textContent = (pl>=0?'+':'') + pl.toLocaleString('zh-CN', {minimumFractionDigits:2}) + ' (' + (plPct>=0?'+':'') + plPct + '%)';
    plEl.className = 'value ' + (pl>=0?'green':'red');
  } catch(e) { console.log('300724 fetch fail:', e); }

  // 基金012414净值
  try {
    const resp = await fetch('https://api.fund.eastmoney.com/f10/lsjz?fundCode=012414&pageIndex=1&pageSize=1');
    const d = await resp.json();
    if (d.Data && d.Data.LSJZList && d.Data.LSJZList.length > 0) {
      const nav = parseFloat(d.Data.LSJZList[0].DWJZ);
      const val = nav * HOLDINGS['012414'].shares;
      const costVal = HOLDINGS['012414'].cost * HOLDINGS['012414'].shares;
      const pl = val - costVal;
      const plPct = ((nav - HOLDINGS['012414'].cost) / HOLDINGS['012414'].cost * 100).toFixed(2);

      document.getElementById('val012414').textContent = '¥' + val.toLocaleString('zh-CN', {minimumFractionDigits:2});
      const plEl = document.getElementById('pl012414');
      plEl.textContent = (pl>=0?'+':'') + pl.toLocaleString('zh-CN', {minimumFractionDigits:2}) + ' (' + (plPct>=0?'+':'') + plPct + '%)';
      plEl.className = 'value ' + (pl>=0?'green':'red');
    }
  } catch(e) { console.log('012414 fetch fail:', e); }

  // 基金007339净值
  try {
    const resp = await fetch('https://api.fund.eastmoney.com/f10/lsjz?fundCode=007339&pageIndex=1&pageSize=1');
    const d = await resp.json();
    if (d.Data && d.Data.LSJZList && d.Data.LSJZList.length > 0) {
      const nav = parseFloat(d.Data.LSJZList[0].DWJZ);
      const val = nav * HOLDINGS['007339'].shares;
      const costVal = HOLDINGS['007339'].cost * HOLDINGS['007339'].shares;
      const pl = val - costVal;
      const plPct = ((nav - HOLDINGS['007339'].cost) / HOLDINGS['007339'].cost * 100).toFixed(2);

      document.getElementById('val007339').textContent = '¥' + val.toLocaleString('zh-CN', {minimumFractionDigits:2});
      const plEl = document.getElementById('pl007339');
      plEl.textContent = (pl>=0?'+':'') + pl.toLocaleString('zh-CN', {minimumFractionDigits:2}) + ' (' + (plPct>=0?'+':'') + plPct + '%)';
      plEl.className = 'value ' + (pl>=0?'green':'red');
    }
  } catch(e) { console.log('007339 fetch fail:', e); }
}

// === K线图 ===
async function initChart() {
  const container = document.getElementById('chart300724');
  const chart = window.LightweightCharts.createChart(container, {
    layout: {
      background: { type:'solid', color:'rgba(0,0,0,0.3)' },
      textColor: '#888',
    },
    grid: {
      vertLines: { color:'rgba(255,255,255,0.05)' },
      horzLines: { color:'rgba(255,255,255,0.05)' },
    },
    crosshair: { mode:0 },
    rightPriceScale: { borderColor:'rgba(255,255,255,0.1)' },
    timeScale: { borderColor:'rgba(255,255,255,0.1)', timeVisible:true },
  });

  // 获取K线数据
  try {
    const resp = await fetch('https://push2his.eastmoney.com/api/qt/stock/kline/get?secid=0.300724&fields1=f1,f2,f3,f4,f5,f6&fields2=f51,f52,f53,f54,f55,f56,f57,f58,f59,f60,f61&klt=101&fqt=0&end=20500101&lmt=200');
    const d = await resp.json();
    const raw = d.data.klines;
    const candleData = raw.map(k => {
      const parts = k.split(',');
      return {
        time: parts[0],
        open: parseFloat(parts[1]),
        high: parseFloat(parts[3]),
        low: parseFloat(parts[4]),
        close: parseFloat(parts[2])
      };
    });

    const series = chart.addCandlestickSeries({
      upColor:'#0f0', downColor:'#f44', borderUpColor:'#0f0', borderDownColor:'#f44',
      wickUpColor:'#0f0', wickDownColor:'#f44',
    });
    series.setData(candleData);

    // 成本线
    series.createPriceLine({
      price: 78.67,
      color: '#ff0',
      lineWidth: 2,
      lineStyle: 2, // dashed
      axisLabelVisible: true,
      title: '成本 78.67',
    });

    // 标记操作点位
    const markers = TRADES.filter(t => t.symbol === '300724').map(t => ({
      time: t.date,
      position: t.type === 'buy' ? 'belowBar' : 'aboveBar',
      color: t.type === 'buy' ? '#0f0' : '#f44',
      shape: t.type === 'buy' ? 'arrowUp' : 'arrowDown',
      text: t.type === 'buy' ? 'B ' + t.price : 'S ' + t.price,
      size: 2,
    }));
    if (markers.length > 0) series.setMarkers(markers);

    chart.timeScale().fitContent();

    // 响应式
    window.addEventListener('resize', () => {
      chart.applyOptions({ width:container.clientWidth, height:500 });
    });
  } catch(e) {
    container.innerHTML = '<div class="empty-state">K线图加载失败，请检查网络</div>';
  }
}

// === 渲染操作记录表 ===
function renderTrades() {
  const tbody = document.getElementById('tradeBody');
  if (TRADES.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty-state">暂无操作记录</td></tr>';
    return;
  }
  tbody.innerHTML = TRADES.map(t => `
    <tr>
      <td>${t.date}</td>
      <td>${t.symbol}</td>
      <td class="${t.type}">${t.type==='buy'?'买入':'卖出'}</td>
      <td>¥${t.price}</td>
      <td>${t.shares}</td>
      <td>${t.note||''}</td>
    </tr>
  `).join('');
}

// === 启动 ===
updateHoldings();
initChart();
renderTrades();
</script>
</body>
</html>
