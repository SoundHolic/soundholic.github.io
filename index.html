<main>

<section id="joker-hero" style="min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:radial-gradient(ellipse at center,#1a1025 0%,#0a0a1a 70%)">
  <div id="joker-container" style="position:relative;width:min(80vw,500px);height:min(80vw,500px)">
    <svg viewBox="0 0 500 500" style="width:100%;height:100%;filter:drop-shadow(0 0 30px rgba(168,85,247,0.5)) drop-shadow(0 0 60px rgba(34,211,238,0.3))">
      <!-- Hair -->
      <ellipse cx="250" cy="80" rx="180" ry="120" fill="#22c55e"/>
      <path d="M120 150 Q80 60 150 20 Q220 -20 250 10 Q280 -20 350 20 Q420 60 380 150" fill="#16a34a"/>
      <path d="M100 140 Q60 30 250 0 Q440 30 400 140" fill="#22c55e"/>
      
      <!-- Face -->
      <ellipse cx="250" cy="250" rx="150" ry="170" fill="#f8fafc"/>
      <ellipse cx="250" cy="255" rx="135" ry="155" fill="#ffffff"/>
      
      <!-- Red nose -->
      <ellipse cx="250" cy="260" rx="22" ry="26" fill="#ef4444"/>
      <ellipse cx="244" cy="253" rx="8" ry="6" fill="#fca5a5" opacity="0.6"/>
      
      <!-- Eye makeup (dark triangles) -->
      <path d="M160 210 L200 230 L120 240 Z" fill="#1e1b4b" opacity="0.7"/>
      <path d="M340 210 L300 230 L380 240 Z" fill="#1e1b4b" opacity="0.7"/>
      
      <!-- Eyes -->
      <ellipse cx="195" cy="235" rx="28" ry="20" fill="#ffffff"/>
      <ellipse cx="305" cy="235" rx="28" ry="20" fill="#ffffff"/>
      <circle cx="200" cy="235" r="12" fill="#1e293b"/>
      <circle cx="300" cy="235" r="12" fill="#1e293b"/>
      <circle cx="204" cy="231" r="4" fill="#ffffff"/>
      <circle cx="304" cy="231" r="4" fill="#ffffff"/>
      
      <!-- Eyebrows -->
      <path d="M160 200 Q195 185 230 205" stroke="#1e293b" stroke-width="5" fill="none" stroke-linecap="round"/>
      <path d="M340 200 Q305 185 270 205" stroke="#1e293b" stroke-width="5" fill="none" stroke-linecap="round"/>
      
      <!-- Smile -->
      <path d="M160 300 Q250 400 340 300" stroke="#1e293b" stroke-width="5" fill="none" stroke-linecap="round"/>
      <path d="M160 300 Q170 360 185 370" stroke="#dc2626" stroke-width="6" fill="none" stroke-linecap="round"/>
      <path d="M340 300 Q330 360 315 370" stroke="#dc2626" stroke-width="6" fill="none" stroke-linecap="round"/>
      
      <!-- Teeth -->
      <path d="M220 310 Q250 330 280 310" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
      <rect x="228" y="290" width="8" height="8" rx="2" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
      <rect x="264" y="290" width="8" height="8" rx="2" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
      
      <!-- Red lips -->
      <path d="M160 300 Q250 380 340 300" fill="#dc2626" opacity="0.3"/>
      <path d="M190 320 Q250 370 310 320" fill="#dc2626" opacity="0.2"/>
      
      <!-- Suit collar -->
      <path d="M140 420 L250 350 L360 420" fill="#7c3aed"/>
      <path d="M140 420 L250 380 L150 480 Z" fill="#6d28d9"/>
      <path d="M360 420 L250 380 L350 480 Z" fill="#6d28d9"/>
    </svg>
    <!-- Neon ring -->
    <div style="position:absolute;top:-20px;left:-20px;right:-20px;bottom:-20px;border:3px solid rgba(168,85,247,0.4);border-radius:50%;animation:joker-pulse 3s ease-in-out infinite;pointer-events:none"></div>
    <div style="position:absolute;top:-40px;left:-40px;right:-40px;bottom:-40px;border:2px solid rgba(34,211,238,0.2);border-radius:50%;animation:joker-pulse 3s ease-in-out 0.5s infinite;pointer-events:none"></div>
  </div>
  <!-- Floating particles -->
  <div style="position:absolute;inset:0;pointer-events:none;overflow:hidden">
    <div style="position:absolute;top:10%;left:20%;width:8px;height:8px;background:#a855f7;border-radius:50%;animation:float-up 4s ease-in-out infinite"></div>
    <div style="position:absolute;top:30%;right:25%;width:6px;height:6px;background:#22d3ee;border-radius:50%;animation:float-up 5s ease-in-out 1s infinite"></div>
    <div style="position:absolute;bottom:20%;left:35%;width:10px;height:10px;background:#22c55e;border-radius:50%;animation:float-up 3.5s ease-in-out 2s infinite"></div>
    <div style="position:absolute;top:50%;right:15%;width:5px;height:5px;background:#ef4444;border-radius:50%;animation:float-up 4.5s ease-in-out 0.5s infinite"></div>
    <div style="position:absolute;bottom:40%;left:10%;width:7px;height:7px;background:#a855f7;border-radius:50%;animation:float-up 3s ease-in-out 1.5s infinite"></div>
  </div>
</section>

<style>
@keyframes joker-pulse {
  0%,100% { opacity:0.4; transform:scale(1); }
  50% { opacity:0.8; transform:scale(1.05); }
}
@keyframes float-up {
  0%,100% { transform:translateY(0) translateX(0); opacity:0.3; }
  50% { transform:translateY(-30px) translateX(10px); opacity:0.8; }
}
#joker-container svg {
  transition: transform 0.1s ease;
}
</style>

<script>
(function(){
  var s = document.getElementById('joker-container');
  if(!s) return;
  var svg = s.querySelector('svg');
  window.addEventListener('scroll',function(){
    var y = window.scrollY;
    var maxY = Math.max(document.body.scrollHeight - window.innerHeight, 1);
    var pct = Math.min(y / maxY, 1);
    if(svg) svg.style.transform = 'rotate(' + (pct * 15 - 5) + 'deg) scale(' + (1 + pct * 0.15) + ')';
  });
})();
</script>

</main>
