var canvas = document.getElementById('rain');
var ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

var cols = 0;
var drops = [];
var fontSize = 16;
var speeds = [];
var colors = ['#22c55e','#4ade80','#a855f7','#22d3ee','#34d399','#818cf8','#2dd4bf'];

function init() {
  cols = Math.floor(canvas.width / (fontSize * 1.8));
  drops = [];
  speeds = [];
  for (var i = 0; i < cols; i++) {
    drops[i] = Math.random() * -canvas.height;
    speeds[i] = 0.8 + Math.random() * 2.5;
  }
}
init();
window.addEventListener('resize', init);

function draw() {
  ctx.fillStyle = 'rgba(10,10,26,0.12)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  for (var i = 0; i < drops.length; i++) {
    var word = WORDS[Math.floor(Math.random() * WORDS.length)];
    var x = i * fontSize * 1.8;
    var y = drops[i] * fontSize;
    var color = colors[Math.floor(Math.random() * colors.length)];

    ctx.font = 'bold ' + fontSize + 'px "Microsoft YaHei","PingFang SC",sans-serif';
    ctx.shadowColor = color;
    ctx.shadowBlur = 8;
    ctx.globalAlpha = 0.9;
    ctx.fillStyle = color;
    ctx.fillText(word.charAt(0), x, y);
    ctx.globalAlpha = 0.5;
    ctx.fillText(word.slice(1), x + fontSize, y);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;

    drops[i] += speeds[i];
    if (drops[i] * fontSize > canvas.height + 100 && Math.random() > 0.975) {
      drops[i] = Math.random() * -10;
      speeds[i] = 0.8 + Math.random() * 2.5;
    }
  }
}

setInterval(draw, 50);
