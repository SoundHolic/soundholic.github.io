var canvas = document.getElementById('rain');
var ctx = canvas.getContext('2d');
var dpr = window.devicePixelRatio || 1;
var fontSize, cols, drops, speeds;
var colors = ['#22c55e','#4ade80','#a855f7','#22d3ee','#34d399','#818cf8','#2dd4bf'];

function setup() {
  var w = window.innerWidth;
  var h = window.innerHeight;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  if (w < 400) { fontSize = 13; }
  else if (w < 768) { fontSize = 15; }
  else { fontSize = 17; }

  var spacing = fontSize * 1.6;
  cols = Math.floor(w / spacing);
  drops = new Array(cols);
  speeds = new Array(cols);
  for (var i = 0; i < cols; i++) {
    drops[i] = Math.random() * -h;
    speeds[i] = 0.6 + Math.random() * 2.2;
  }
}

setup();
window.addEventListener('resize', setup);
window.addEventListener('orientationchange', function(){ setTimeout(setup, 200); });

function draw() {
  var w = window.innerWidth;
  var h = window.innerHeight;
  ctx.fillStyle = 'rgba(10,10,26,0.1)';
  ctx.fillRect(0, 0, w, h);

  var spacing = fontSize * 1.6;
  for (var i = 0; i < cols; i++) {
    var word = WORDS[Math.floor(Math.random() * WORDS.length)];
    var x = i * spacing + 2;
    var y = drops[i];

    var color = colors[Math.floor(Math.random() * colors.length)];

    ctx.font = 'bold ' + fontSize + 'px "Microsoft YaHei","PingFang SC","Noto Sans SC",sans-serif';
    ctx.shadowColor = color;
    ctx.shadowBlur = 6;
    ctx.fillStyle = color;

    ctx.globalAlpha = 0.95;
    ctx.fillText(word[0], x, y);

    if (word.length > 1) {
      ctx.globalAlpha = 0.45;
      ctx.fillText(word.slice(1), x + fontSize * 0.9, y);
    }

    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;

    drops[i] += speeds[i];

    if (drops[i] > h + 80 && Math.random() > 0.97) {
      drops[i] = Math.random() * -60;
      speeds[i] = 0.6 + Math.random() * 2.2;
    }
  }
  requestAnimationFrame(draw);
}

requestAnimationFrame(draw);
