<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<meta name="theme-color" content="#0a0a1a">
<title>记录 | ishuai</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700;900&family=M+PLUS+Rounded+1c:wght@400;700;800&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  .records-container { max-width:700px; margin:120px auto 0; padding:0 20px; }
  .article-card {
    position:relative; border-radius:12px; overflow:hidden;
    margin-bottom:24px; border:1px solid rgba(0,255,255,0.12);
    transition:border-color .3s,transform .2s;
  }
  .article-card:hover { border-color:rgba(0,255,255,0.3); transform:translateY(-2px); }
  .article-cover { line-height:0; }
  .article-cover .cover-img {
    width:100%; height:340px; object-fit:cover; display:block;
    transition:transform .4s;
  }
  .article-card:hover .cover-img { transform:scale(1.04); }
  .article-body {
    position:absolute; bottom:0; left:0; right:0;
    padding:50px 22px 22px;
    background:linear-gradient(transparent,rgba(0,0,0,0.7) 30%,rgba(0,0,0,0.88));
    pointer-events:none;
  }
  .article-date {
    font-size:12px; color:#0ff; font-family:Orbitron; margin-bottom:6px;
    text-shadow:0 1px 4px rgba(0,0,0,0.6);
  }
  .article-text {
    font-size:15px; color:#eee; line-height:1.8;
    text-shadow:0 1px 4px rgba(0,0,0,0.7);
  }
  .article-text * { pointer-events:auto; }
  .read-more-btn {
    color:#0ff; cursor:pointer; font-size:14px;
    margin-left:4px; white-space:nowrap; transition:color .2s;
    pointer-events:auto;
  }
  .read-more-btn:hover { color:#fff; }
  .cover-thumbs {
    display:flex; gap:8px; padding:8px 12px; overflow-x:auto;
    background:rgba(0,0,0,0.4); justify-content:center; flex-wrap:wrap;
  }
  .cover-thumbs:empty { display:none; }
  .cover-thumb {
    width:60px; height:45px; object-fit:cover; border-radius:4px;
    border:2px solid transparent; cursor:pointer; opacity:.5;
    transition:border-color .2s,opacity .2s; flex-shrink:0;
  }
  .cover-thumb:hover, .cover-thumb.active { border-color:#0ff; opacity:1; }
  @media (max-width:480px) {
    .article-cover .cover-img { height:240px; }
    .article-body { padding:40px 14px 16px; }
    .article-text { font-size:14px; }
  }
</style>
</head>
<body>
<div id="particles"></div>
<canvas id="matrix"></canvas>

<header id="header">
  <nav class="nav-container">
    <a href="/index/" class="logo">
      <span class="logo-bracket">[</span>
      <span class="logo-text">ishuai</span>
      <span class="logo-bracket">]</span>
    </a>
    <button class="nav-toggle" aria-label="menu" onclick="toggleNav()">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links" id="navLinks">
      <li><a href="/index/" data-i18n="nav.home">Home</a></li>
      <li><a href="records.html" data-i18n="nav.records" class="active">记录</a></li>
      <li><a href="invest.html" data-i18n="nav.invest">投资</a></li>
      <li class="lang-switch">
        <button class="lang-btn" onclick="toggleLang(event)" aria-label="language">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>
          <span id="langLabel">中</span>
        </button>
        <div class="lang-dropdown" id="langDropdown">
          <button onclick="setLang('zh')">中文</button>
          <button onclick="setLang('en')">English</button>
          <button onclick="setLang('ja')">日本語</button>
        </div>
      </li>
    </ul>
  </nav>
</header>

<main>
<div class="records-container">

  <article class="article-card">
    <div class="article-cover">
      <img src="images/july-sky.jpg" class="cover-img" alt="7月的天空" loading="lazy">
    </div>
    <div class="article-body">
      <div class="article-date">2026-07-08</div>
      <div class="article-text">7月的天空...</div>
    </div>
  </article>

  <article class="article-card">
    <div class="article-cover">
      <img src="images/jiaozi.jpg" class="cover-img" alt="小黑煎饺" loading="lazy">

    <div class="article-body">

        一家叫「小黑煎饺」的早餐店，承载着一代望江本地人的回忆。从高中起就开始吃的煎饺，位置就在水木清华单元楼的下面，必须是菜饺子蘸醋才好吃，价格这些年也涨了不少。
      </div>
    </div>
  </article>

  <article class="article-card">
    <div class="article-cover">
      <img src="images/daily_0706_1.jpg" class="cover-img" alt="" loading="lazy">
      <img src="images/daily_0706_2.jpg" loading="lazy">
    </div>
    <div class="article-body">
      <div class="article-date">2026-07-06</div>
      <div class="article-text">日常...</div>
    </div>
  </article>

</div>

<footer>
  <p>© 2026 shuai · <span data-i18n="footer.powered">Powered by</span> <span class="footer-accent">Code & Coffee ☕</span></p>

<script src="i18n.js"></script>
<script src="main.js"></script>
<script>
// === Cover thumbnail switcher ===
document.querySelectorAll('.article-cover').forEach(cover => {
  const imgs = cover.querySelectorAll('img');
  if (imgs.length <= 1) return;
  const mainImg = imgs[0];
  mainImg.classList.add('cover-img');
  for (let i = 1; i < imgs.length; i++) imgs[i].style.display = 'none';

  const thumbs = document.createElement('div');
  thumbs.className = 'cover-thumbs';
  imgs.forEach((img, i) => {
    const t = document.createElement('img');
    t.src = img.src;
    t.className = 'cover-thumb' + (i === 0 ? ' active' : '');
    t.onclick = function() {
      mainImg.src = t.src;
      thumbs.querySelectorAll('.cover-thumb').forEach(el => el.classList.remove('active'));
      t.classList.add('active');
    };
    thumbs.appendChild(t);
  });
  cover.appendChild(thumbs);
});

// === Read more truncation (50 chars) ===
document.querySelectorAll('.article-text').forEach(el => {
  const text = el.textContent.trim();
  if (text.length <= 50) return;
  const fullHTML = el.innerHTML;
  el.innerHTML = text.slice(0, 50) + '... <span class="read-more-btn" onclick="expandText(this)">【阅读全文】</span>';
  el.dataset.fullHTML = fullHTML;
});

function expandText(btn) {
  const el = btn.closest('.article-text');
  el.innerHTML = el.dataset.fullHTML;
}
</script>
</body>
</html>
